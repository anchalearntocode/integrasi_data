<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Data - Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <!-- Login Form -->
      <div class="auth-card glass" id="login-form">
        <h2 class="auth-title">Welcome Back</h2>
        <div id="login-alert" class="alert alert-error"></div>

        <form id="form-login">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              id="login-username"
              class="form-control"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              id="login-password"
              class="form-control"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary mt-3">Sign In</button>
        </form>

        <div class="text-center mt-4">
          <a href="#" class="form-link" onclick="toggleAuth('register')">
            Don't have an account? Sign up
          </a>
        </div>
      </div>

      <!-- Register Form -->
      <div class="auth-card glass" id="register-form" style="display: none">
        <h2 class="auth-title">Create Account</h2>
        <div id="register-alert" class="alert alert-error"></div>

        <form id="form-register">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              id="reg-username"
              class="form-control"
              placeholder="Choose a username"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              id="reg-password"
              class="form-control"
              placeholder="Create a password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary mt-3">Sign Up</button>
        </form>

        <div class="text-center mt-4">
          <a href="#" class="form-link" onclick="toggleAuth('login')">
            Already have an account? Sign in
          </a>
        </div>
      </div>
    </div>

    <script src="js/app.js?v=500"></script>

    <script>
      function toggleAuth(type) {
        if (type === "register") {
          document.getElementById("login-form").style.display = "none";
          document.getElementById("register-form").style.display = "block";
        } else {
          document.getElementById("register-form").style.display = "none";
          document.getElementById("login-form").style.display = "block";
        }
      }

      if (localStorage.getItem("user_id")) {
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
