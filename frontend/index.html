<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Informasi Alumni Tracer Study - Login Area">
    <title>AlumniHub — Login Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="auth-title">AlumniHub Admin</h1>
                <p class="auth-subtitle">Masuk ke sistem manajemen alumni</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Masuk</div>
                <div class="auth-tab" onclick="switchTab('register')">Daftar</div>
            </div>

            <form class="auth-form" id="authForm" onsubmit="handleAuth(event)">
                <input type="hidden" id="authMode" value="login">

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="glass-input" placeholder="Masukkan username admin"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="glass-input" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 16px;">
                    <button type="submit" class="btn-submit" style="width: 100%;">
                        <span id="btnText">Masuk Sekarang</span>
                        <i class="fas fa-arrow-right-to-bracket" id="btnIcon"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js?v=8"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('user_id')) {
            window.location.href = 'dashboard.html';
        }

        function switchTab(mode) {
            document.getElementById('authMode').value = mode;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            if (mode === 'login') {
                btnText.textContent = 'Masuk Sekarang';
                btnIcon.className = 'fas fa-arrow-right-to-bracket';
            } else {
                btnText.textContent = 'Daftar Akun Baru';
                btnIcon.className = 'fas fa-user-plus';
            }
        }
    </script>
</body>

</html>
