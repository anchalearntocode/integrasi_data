<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Form Input Data Alumni">
    <title>AlumniHub — Input Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="app-layout">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <a href="dashboard.html" class="sidebar-logo">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap" style="color:#fff;font-size:16px;"></i>
                </div>
                <span class="logo-text">AlumniHub</span>
            </a>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="data.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Data Alumni</span>
                </a>
                <a href="input.html" class="nav-item active">
                    <i class="fas fa-pen-to-square"></i>
                    <span>Input Data</span>
                </a>
                <a href="api_key.html" class="nav-item">
                    <i class="fas fa-key"></i>
                    <span>API Key</span>
                </a>
            </nav>

            <div class="sidebar-bottom">
                <div class="user-avatar" id="avatarInitial">A</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUsername">Administrator</div>
                    <div class="user-role">Super Admin</div>
                </div>
                <a href="#" class="settings-btn" onclick="logout()" title="Keluar">
                    <i class="fas fa-arrow-right-from-bracket"></i>
                </a>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content" id="mainContent">
            <!-- TOP BAR -->
            <div class="topbar">
                <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="breadcrumb">
                    <i class="fas fa-house" style="font-size:11px;"></i>
                    <span style="color:var(--text-muted);">/</span>
                    <span>Input Data Baru</span>
                </div>
                <div class="topbar-right">
                    <div class="topbar-icon-btn">
                        <i class="fas fa-bell" style="font-size:13px;"></i>
                        <div class="notif-dot"></div>
                    </div>
                    <div class="user-avatar" style="width:32px;height:32px;font-size:12px;cursor:pointer;"
                        id="topbarAvatar">A</div>
                </div>
            </div>

            <!-- PAGE CONTENT -->
            <section class="page-section active">
                <div class="page-title">Tambah Data Alumni Baru</div>
                <div class="page-subtitle">Pastikan data yang dimasukkan valid dan sesuai dengan format laporan Tracer
                    Study.</div>

                <div class="glass-card" style="max-width: 800px;">
                    <div class="section-header">
                        <div class="section-title">Form Data Responden</div>
                        <div class="section-badge">Dimensi Wajib</div>
                    </div>

                    <form id="insertDataForm" onsubmit="submitNewData(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="kode_responden_asli">Kode Responden</label>
                                <input type="text" id="kode_responden_asli" name="kode_responden_asli"
                                    class="form-input" placeholder="Misal: RESP-2024-001" required>
                            </div>
                            <div class="form-group">
                                <label for="nama_prodi">Program Studi</label>
                                <select id="nama_prodi" name="nama_prodi" class="form-select" required>
                                    <option value="" disabled selected>Pilih Program Studi</option>
                                    <option value="Teknik Komputer dan Jaringan (TKJ)">Teknik Komputer dan Jaringan
                                        (TKJ)</option>
                                    <option value="Teknik Multimedia dan Jaringan (TMJ)">Teknik Multimedia dan Jaringan
                                        (TMJ)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="tahun_lulus">Tahun Lulus</label>
                                <select id="tahun_lulus" name="tahun_lulus" class="form-select" required>
                                    <option value="" disabled selected>Pilih Tahun Lulus</option>
                                    <option value="2023">2023</option>
                                    <option value="2024">2024</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="jenjang">Jenjang</label>
                                <select id="jenjang" name="jenjang" class="form-select" required>
                                    <option value="" disabled selected>Pilih Jenjang</option>
                                    <option value="D1">D1</option>
                                    <option value="D3">D3</option>
                                    <option value="D4">D4</option>
                                    <option value="S1">S1</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="status_kerja">Status Pekerjaan</label>
                                <select id="status_kerja" name="status_kerja" class="form-select" required
                                    onchange="toggleLamaTunggu()">
                                    <option value="" disabled selected>Pilih Status Kerja</option>
                                    <option value="Bekerja (full time/part time)">Bekerja (full time/part time)</option>
                                    <option value="Wiraswasta">Wiraswasta</option>
                                    <option value="Melanjutkan Pendidikan">Melanjutkan Pendidikan</option>
                                    <option value="Tidak Bekerja">Tidak Bekerja</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="lama_tunggu_bulan">Waktu Tunggu Mendapatkan Pekerjaan (Bulan)</label>
                                <input type="number" id="lama_tunggu_bulan" name="lama_tunggu_bulan" class="form-input"
                                    placeholder="Misal: 3" min="0" required>
                            </div>
                            <div class="form-group full"
                                style="border-top:1px solid rgba(255,255,255,0.05); margin-top:16px; padding-top:24px;">
                                <div class="form-actions" style="justify-content:flex-end;">
                                    <button type="button" class="btn-cancel"
                                        onclick="document.getElementById('insertDataForm').reset(); toggleLamaTunggu();">Batal</button>
                                    <button type="submit" class="btn-submit"
                                        style="flex:none; padding-left:32px; padding-right:32px;">
                                        <i class="fas fa-save"></i> Simpan Data
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js?v=8"></script>
    <script>
        checkAuth();

        let sidebarCollapsed = window.innerWidth <= 900;
        if (sidebarCollapsed) {
            document.getElementById('sidebar').classList.add('collapsed');
            document.getElementById('mainContent').classList.add('expanded');
        }

        function toggleSidebar() {
            sidebarCollapsed = !sidebarCollapsed;
            document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
            document.getElementById('mainContent').classList.toggle('expanded', sidebarCollapsed);

            const backdrop = document.getElementById('sidebarBackdrop');
            if (window.innerWidth <= 900 && !sidebarCollapsed) {
                backdrop.classList.add('visible');
            } else {
                backdrop.classList.remove('visible');
            }
        }

        window.addEventListener('resize', () => {
            const backdrop = document.getElementById('sidebarBackdrop');
            if (window.innerWidth > 900) {
                backdrop.classList.remove('visible');
            } else if (!sidebarCollapsed) {
                backdrop.classList.add('visible');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('username') || 'Administrator';
            document.getElementById('sidebarUsername').textContent = username;
            const initial = username.charAt(0).toUpperCase();
            document.getElementById('avatarInitial').textContent = initial;
            document.getElementById('topbarAvatar').textContent = initial;
        });

        function toggleLamaTunggu() {
            const status = document.getElementById('status_kerja').value;
            const lamaInput = document.getElementById('lama_tunggu_bulan');
            if (status === 'Tidak Bekerja' || status === 'Melanjutkan Pendidikan') {
                lamaInput.value = 0;
                lamaInput.readOnly = true;
                lamaInput.style.opacity = 0.5;
            } else {
                lamaInput.readOnly = false;
                lamaInput.style.opacity = 1;
                if (lamaInput.value == 0) lamaInput.value = '';
            }
        }

        async function submitNewData(e) {
            e.preventDefault();
            const form = document.getElementById('insertDataForm');
            const formData = new FormData(form);

            // Tampilkan loading di button
            const submitBtn = form.querySelector('.btn-submit');
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/integrasi_data/backend/insert_data.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'Tersimpan!',
                        text: 'Data alumni berhasil ditambahkan ke database.',
                        background: '#0f1420', color: '#f1f5f9', confirmButtonColor: '#00e5ff'
                    });
                    form.reset();
                    toggleLamaTunggu();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal Menyimpan',
                        text: result.message || 'Terjadi kesalahan sistem.',
                        background: '#0f1420', color: '#f1f5f9', confirmButtonColor: '#ff4081'
                    });
                }
            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: 'error',
                    title: 'Koneksi Error',
                    text: 'Tidak dapat terhubung ke server backend.',
                    background: '#0f1420', color: '#f1f5f9', confirmButtonColor: '#ff4081'
                });
            } finally {
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
