<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Data — DataAlumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080d17;
        --bg-1: #0d1526;
        --bg-2: #101e34;
        --surface: rgba(13, 21, 38, 0.8);
        --surface-2: rgba(16, 30, 52, 0.7);
        --border: rgba(99, 179, 237, 0.12);
        --border-2: rgba(99, 179, 237, 0.22);

        --cyan: #38bdf8;
        --cyan-dim: #7dd3fc;
        --blue: #3b82f6;
        --blue-dark: #1d4ed8;

        --text: #e2eaf6;
        --text-2: #94a9c4;
        --text-3: #5b7294;

        --green: #34d399;
        --red: #f87171;
        --amber: #fbbf24;

        --sidebar-w: 256px;
        --r-xl: 22px;
        --r-lg: 16px;
        --r-md: 12px;
        --shadow: 0 24px 60px rgba(2, 8, 20, 0.5);

        --font-body: "Plus Jakarta Sans", sans-serif;
        --font-display: "Syne", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 70% 50% at 20% -10%,
            rgba(56, 189, 248, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 110%,
            rgba(59, 130, 246, 0.07) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .layout-wrapper {
        display: flex;
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* SIDEBAR */
      .sidebar {
        width: var(--sidebar-w);
        background: rgba(8, 13, 23, 0.96);
        border-right: 1px solid var(--border);
        backdrop-filter: blur(24px);
        display: flex;
        flex-direction: column;
        padding: 28px 16px 24px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .sidebar-logo {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--cyan);
        letter-spacing: -0.03em;
        padding: 0 10px 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }
      .sidebar-logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--cyan), var(--blue));
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }
      .sidebar-section-label {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--text-3);
        padding: 10px 12px 6px;
        text-transform: uppercase;
      }
      .nav-link {
        text-decoration: none;
        color: var(--text-2);
        padding: 11px 12px;
        border-radius: var(--r-md);
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 0.88rem;
        transition: 0.22s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
        overflow: hidden;
      }
      .nav-link .nav-icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.04);
        transition: 0.22s ease;
      }
      .nav-link:hover {
        color: var(--text);
        background: rgba(99, 179, 237, 0.07);
      }
      .nav-link:hover .nav-icon {
        background: rgba(56, 189, 248, 0.12);
      }
      .nav-link.active {
        color: var(--cyan-dim);
        background: linear-gradient(
          135deg,
          rgba(56, 189, 248, 0.13),
          rgba(59, 130, 246, 0.09)
        );
        border: 1px solid rgba(56, 189, 248, 0.18);
      }
      .nav-link.active .nav-icon {
        background: rgba(56, 189, 248, 0.18);
        color: var(--cyan);
      }
      .nav-link.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 20%;
        bottom: 20%;
        width: 3px;
        background: var(--cyan);
        border-radius: 0 4px 4px 0;
      }
      .nav-link.nav-logout {
        margin-top: auto;
        color: #fda4af;
      }
      .nav-link.nav-logout:hover {
        color: #fecdd3;
        background: rgba(251, 113, 133, 0.1);
      }
      .nav-link.nav-logout .nav-icon {
        background: rgba(251, 113, 133, 0.08);
      }

      /* MAIN */
      .main-content {
        flex: 1;
        padding: 36px 40px;
        min-width: 0;
      }

      .page-header {
        margin-bottom: 28px;
      }
      .page-breadcrumb {
        font-size: 0.78rem;
        color: var(--text-3);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .page-breadcrumb span {
        color: var(--cyan-dim);
      }
      .page-title {
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 2.5vw, 2.2rem);
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.04em;
      }
      .page-subtitle {
        color: var(--text-2);
        font-size: 0.9rem;
        margin-top: 6px;
      }

      /* CARD */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-xl);
        backdrop-filter: blur(18px);
        padding: 32px;
        max-width: 860px;
      }

      /* FORM SECTIONS */
      .form-section {
        margin-bottom: 28px;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--border);
      }
      .form-section:last-of-type {
        border-bottom: 0;
        margin-bottom: 0;
        padding-bottom: 0;
      }
      .form-section-title {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cyan-dim);
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-section-title::before {
        content: "";
        display: block;
        width: 3px;
        height: 14px;
        background: var(--cyan);
        border-radius: 2px;
      }

      .two-col-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        margin-bottom: 0;
      }

      .form-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-2);
        margin-bottom: 8px;
        letter-spacing: 0.02em;
      }
      .form-label .required {
        color: var(--red);
        margin-left: 2px;
      }

      /* Input wrapper with floating label effect */
      .input-wrap {
        position: relative;
      }
      .form-control {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        background: rgba(8, 13, 23, 0.7);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.88rem;
        outline: none;
        transition: 0.2s ease;
      }
      .form-control:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        background: rgba(8, 13, 23, 0.9);
      }
      .form-control::placeholder {
        color: var(--text-3);
      }
      .form-control:valid:not(:placeholder-shown) {
        border-color: rgba(52, 211, 153, 0.35);
      }
      select.form-control {
        cursor: pointer;
      }
      select.form-control option {
        background: #0d1526;
        color: var(--text);
      }

      /* ALERT */
      .alert {
        display: none;
        padding: 13px 16px;
        border-radius: var(--r-md);
        margin-bottom: 24px;
        font-size: 0.88rem;
        font-weight: 600;
        animation: slideIn 0.3s ease;
      }
      .alert-error {
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.22);
        color: #fca5a5;
      }
      .alert-success {
        background: rgba(52, 211, 153, 0.08);
        border: 1px solid rgba(52, 211, 153, 0.22);
        color: #6ee7b7;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* SUBMIT BUTTON */
      .btn-wrap {
        padding-top: 8px;
      }
      .btn {
        width: 100%;
        padding: 14px 20px;
        border: 0;
        border-radius: var(--r-lg);
        font-family: var(--font-body);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.22s cubic-bezier(0.22, 1, 0.36, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        color: #fff;
        box-shadow: 0 8px 28px rgba(56, 189, 248, 0.22);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(56, 189, 248, 0.3);
        filter: brightness(1.06);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-primary:active {
        transform: translateY(0);
      }

      /* PROGRESS INDICATOR */
      .form-progress {
        display: flex;
        gap: 8px;
        margin-bottom: 28px;
        align-items: center;
      }
      .progress-step {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-3);
      }
      .progress-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--text-3);
        transition: 0.2s ease;
      }
      .progress-dot.active {
        background: rgba(56, 189, 248, 0.15);
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .progress-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* TOAST */
      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        background: rgba(8, 13, 23, 0.96);
        border: 1px solid var(--border-2);
        color: var(--cyan-dim);
        padding: 13px 18px;
        border-radius: var(--r-lg);
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(14px);
        pointer-events: none;
        transition: 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 9999;
        font-size: 0.88rem;
        font-weight: 600;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* RESPONSIVE */
      @media (max-width: 980px) {
        .layout-wrapper {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          height: auto;
          position: relative;
          flex-direction: row;
          flex-wrap: wrap;
          padding: 16px;
        }
        .sidebar-logo {
          border-bottom: none;
          padding-bottom: 0;
          margin-bottom: 0;
        }
        .sidebar-section-label {
          display: none;
        }
        .nav-link.nav-logout {
          margin-top: 0;
        }
        .main-content {
          padding: 24px 20px;
        }
      }
      @media (max-width: 640px) {
        .two-col-grid {
          grid-template-columns: 1fr;
        }
        .card {
          padding: 22px 18px;
        }
        .main-content {
          padding: 18px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-wrapper">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="sidebar-logo-icon">◈</div>
          Data Alumni
        </a>
        <div class="sidebar-section-label">Navigasi</div>
        <a href="dashboard.html" class="nav-link">
          <div class="nav-icon">📊</div>
          Dashboard
        </a>
        <a href="data.html" class="nav-link">
          <div class="nav-icon">🗄️</div>
          Data Alumni
        </a>
        <a href="input.html" class="nav-link active">
          <div class="nav-icon">✏️</div>
          Input Data
        </a>
        <a href="#" class="nav-link nav-logout" onclick="logout()">
          <div class="nav-icon">🚪</div>
          Logout
        </a>
      </aside>

      <!-- MAIN -->
      <main class="main-content">
        <div class="page-header">
          <h1 class="page-title">Input Data Alumni</h1>
          <p class="page-subtitle">
            Tambahkan data survei tracer study alumni baru ke sistem.
          </p>
        </div>

        <div class="card">
          <div id="form-alert" class="alert"></div>

          <!-- Progress indicator -->
          <div class="form-progress">
            <div class="progress-step">
              <div class="progress-dot active">1</div>
              <span>Identitas</span>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
              <div class="progress-dot active">2</div>
              <span>Pekerjaan</span>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
              <div class="progress-dot active">3</div>
              <span>Detail</span>
            </div>
          </div>

          <form id="form-alumni">
            <!-- SECTION 1: Identitas -->
            <div class="form-section">
              <div class="form-section-title">Identitas Alumni</div>
              <div class="two-col-grid">
                <div class="form-group">
                  <label class="form-label"
                    >Kode Responden Asli <span class="required">*</span></label
                  >
                  <input
                    type="text"
                    id="kode_responden_asli"
                    class="form-control"
                    placeholder="Contoh: R-001"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Tahun Lulus <span class="required">*</span></label
                  >
                  <input
                    type="number"
                    id="tahun_lulus"
                    class="form-control"
                    placeholder="Contoh: 2024"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Program Studi <span class="required">*</span></label
                  >
                  <input
                    type="text"
                    id="nama_prodi"
                    class="form-control"
                    placeholder="Contoh: TKJ"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Jenjang <span class="required">*</span></label
                  >
                  <select id="jenjang" class="form-control" required>
                    <option value="" disabled selected>Pilih Jenjang</option>
                    <option value="D3">D3</option>
                    <option value="D4">D4</option>
                    <option value="S1">S1</option>
                  </select>
                </div>
                <div class="form-group" style="grid-column: 1 / -1">
                  <label class="form-label"
                    >Jurusan <span class="required">*</span></label
                  >
                  <input
                    type="text"
                    id="jurusan"
                    class="form-control"
                    placeholder="Contoh: Teknik Informatika dan Komputer"
                    required
                  />
                </div>
              </div>
            </div>

            <!-- SECTION 2: Pekerjaan -->
            <div class="form-section">
              <div class="form-section-title">Informasi Pekerjaan</div>
              <div class="two-col-grid">
                <div class="form-group">
                  <label class="form-label"
                    >Status Kerja <span class="required">*</span></label
                  >
                  <select id="status_kerja" class="form-control" required>
                    <option value="" disabled selected>
                      Pilih Status Kerja
                    </option>
                    <option value="Bekerja">Bekerja</option>
                    <option value="Wiraswasta">Wiraswasta</option>
                    <option value="Melanjutkan Pendidikan">
                      Melanjutkan Pendidikan
                    </option>
                    <option value="Belum Bekerja">Belum Bekerja</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Jenis Pekerjaan</label>
                  <input
                    type="text"
                    id="jenis_pekerjaan"
                    class="form-control"
                    placeholder="Contoh: Full Time, Part Time"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Kategori Instansi / Perusahaan
                    <span class="required">*</span></label
                  >
                  <input
                    type="text"
                    id="kategori_instansi"
                    class="form-control"
                    placeholder="Contoh: Swasta, BUMN, Pemerintah"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">Jenis Lembaga</label>
                  <input
                    type="text"
                    id="jenis_lembaga"
                    class="form-control"
                    placeholder="Contoh: Perusahaan, Instansi Pemerintah"
                  />
                </div>
              </div>
            </div>

            <!-- SECTION 3: Detail -->
            <div class="form-section">
              <div class="form-section-title">Detail Ekonomi &amp; Lokasi</div>
              <div class="two-col-grid">
                <div class="form-group">
                  <label class="form-label"
                    >Range Pendapatan <span class="required">*</span></label
                  >
                  <select id="range_pendapatan" class="form-control" required>
                    <option value="" disabled selected>Pilih Pendapatan</option>
                    <option value="< Rp 2 Juta">&lt; Rp 2 Juta</option>
                    <option value="Rp 2-3 Juta">Rp 2–3 Juta</option>
                    <option value="Rp 3-5 Juta">Rp 3–5 Juta</option>
                    <option value="Rp 5-8 Juta">Rp 5–8 Juta</option>
                    <option value="> Rp 8 Juta">&gt; Rp 8 Juta</option>
                    <option value="Belum Berpenghasilan">
                      Belum Berpenghasilan
                    </option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Lama Tunggu (Bulan) <span class="required">*</span></label
                  >
                  <input
                    type="number"
                    id="lama_tunggu_bulan"
                    class="form-control"
                    placeholder="Contoh: 2"
                    required
                  />
                </div>
                <div class="form-group" style="grid-column: 1 / -1">
                  <label class="form-label"
                    >Kota / Lokasi Kerja <span class="required">*</span></label
                  >
                  <input
                    type="text"
                    id="nama_kota"
                    class="form-control"
                    placeholder="Contoh: Makassar"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="btn-wrap">
              <button type="submit" class="btn btn-primary">
                <span>💾</span> <span>Simpan Data Alumni</span>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/app.js?v=700"></script>
    <script>
      checkAuth();
      document
        .getElementById("form-alumni")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const btn = this.querySelector('button[type="submit"]');
          const alertEl = document.getElementById("form-alert");
          const apiKey = localStorage.getItem("api_key");
          if (!apiKey) {
            alertEl.style.display = "block";
            alertEl.className = "alert alert-error";
            alertEl.textContent =
              "API Key tidak ditemukan. Silakan login ulang.";
            return;
          }
          const btnText = btn.innerHTML;
          btn.innerHTML = "<span>⏳</span> <span>Menyimpan...</span>";
          btn.disabled = true;
          const data = {
            kode_responden_asli: document.getElementById("kode_responden_asli")
              .value,
            tahun_lulus: document.getElementById("tahun_lulus").value,
            nama_prodi: document.getElementById("nama_prodi").value,
            jenjang: document.getElementById("jenjang").value,
            jurusan: document.getElementById("jurusan").value,
            status_kerja: document.getElementById("status_kerja").value,
            jenis_pekerjaan:
              document.getElementById("jenis_pekerjaan").value || "-",
            kategori_instansi:
              document.getElementById("kategori_instansi").value,
            jenis_lembaga:
              document.getElementById("jenis_lembaga").value || "-",
            range_pendapatan: document.getElementById("range_pendapatan").value,
            lama_tunggu_bulan:
              document.getElementById("lama_tunggu_bulan").value,
            nama_kota: document.getElementById("nama_kota").value,
          };
          try {
            const response = await fetch(
              "/data_warehouse/backend/alumni.php?resource=alumni",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "X-API-KEY": apiKey,
                },
                body: JSON.stringify(data),
              },
            );
            const result = await response.json();
            alertEl.style.display = "block";
            if (result.status === "success") {
              alertEl.className = "alert alert-success";
              alertEl.textContent = result.message;
              this.reset();
              if (typeof showToast === "function")
                showToast("✅ Data alumni berhasil disimpan.");
            } else {
              alertEl.className = "alert alert-error";
              alertEl.textContent = result.message;
            }
          } catch (err) {
            console.error(err);
            alertEl.style.display = "block";
            alertEl.className = "alert alert-error";
            alertEl.textContent = "Gagal terhubung ke server.";
          } finally {
            btn.innerHTML = btnText;
            btn.disabled = false;
            setTimeout(() => {
              alertEl.style.display = "none";
            }, 5000);
          }
        });
    </script>
  </body>
</html>
