<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Data - Input Data</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <div class="sidebar glass">
            <a href="dashboard.html" class="sidebar-logo">DataAlumni</a>
            <a href="dashboard.html" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Dashboard
            </a>
            <a href="data.html" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                Data Alumni
            </a>
            <a href="input.html" class="nav-link active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                Input Data
            </a>
            
            <a href="#" class="nav-link nav-logout" onclick="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Input Data Alumni</h1>
                <p class="page-subtitle">Tambahkan data survei tracer study alumni baru</p>
            </div>

            <div class="card glass" style="max-width: 800px;">
                <div id="form-alert" class="alert"></div>
                
                <form id="form-alumni">
                    <div class="two-col-grid">
                        <div class="form-group">
                            <label class="form-label">Kode Responden Asli</label>
                            <input type="text" id="kode_responden_asli" class="form-control" placeholder="Contoh: R-001" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Tahun Lulus</label>
                            <input type="number" id="tahun_lulus" class="form-control" placeholder="Contoh: 2024" required>
                        </div>
                    </div>

                    <div class="two-col-grid">
                        <div class="form-group">
                            <label class="form-label">Program Studi</label>
                            <input type="text" id="nama_prodi" class="form-control" placeholder="Contoh: Teknik Mesin" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Jenjang</label>
                            <select id="jenjang" class="form-control" required>
                                <option value="" disabled selected>Pilih Jenjang</option>
                                <option value="D3">D3</option>
                                <option value="D4">D4</option>
                                <option value="S1">S1</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="two-col-grid">
                        <div class="form-group">
                            <label class="form-label">Jurusan</label>
                            <input type="text" id="jurusan" class="form-control" placeholder="Contoh: Teknik Mesin" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Status Kerja</label>
                            <select id="status_kerja" class="form-control" required>
                                <option value="" disabled selected>Pilih Status Kerja</option>
                                <option value="Bekerja (Full Time)">Bekerja (Full Time)</option>
                                <option value="Bekerja (Part Time)">Bekerja (Part Time)</option>
                                <option value="Wiraswasta">Wiraswasta</option>
                                <option value="Melanjutkan Pendidikan">Melanjutkan Pendidikan</option>
                                <option value="Belum Bekerja">Belum Bekerja</option>
                            </select>
                        </div>
                    </div>

                    <div class="two-col-grid">
                        <div class="form-group">
                            <label class="form-label">Jenis Pekerjaan</label>
                            <input type="text" id="jenis_pekerjaan" class="form-control" placeholder="Contoh: Engineer, Staf IT, dll">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Kategori Instansi/Perusahaan</label>
                            <input type="text" id="kategori_instansi" class="form-control" placeholder="Contoh: Swasta, BUMN..." required>
                        </div>
                    </div>

                    <div class="two-col-grid">
                        <div class="form-group">
                            <label class="form-label">Jenis Lembaga</label>
                            <input type="text" id="jenis_lembaga" class="form-control" placeholder="Contoh: Instansi Pemerintah, dll">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Range Pendapatan</label>
                            <select id="range_pendapatan" class="form-control" required>
                                <option value="" disabled selected>Pilih Pendapatan</option>
                                <option value="< Rp 2 Juta">&lt; Rp 2 Juta</option>
                                <option value="Rp 2-3 Juta">Rp 2-3 Juta</option>
                                <option value="Rp 3-5 Juta">Rp 3-5 Juta</option>
                                <option value="Rp 5-8 Juta">Rp 5-8 Juta</option>
                                <option value="> Rp 8 Juta">&gt; Rp 8 Juta</option>
                                <option value="-">- (Belum Bekerja)</option>
                            </select>
                        </div>
                    </div>

                    <div class="two-col-grid">
                        <div class="form-group">
                            <label class="form-label">Lama Tunggu (Bulan)</label>
                            <input type="number" id="lama_tunggu_bulan" class="form-control" placeholder="Contoh: 2" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Kota / Lokasi Kerja</label>
                            <input type="text" id="nama_kota" class="form-control" placeholder="Contoh: Jakarta, Makassar..." required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Simpan Data Alumni</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=2"></script>
    <script>
        // Check authentication
        checkAuth();
        
        // Handle form submission
        document.getElementById('form-alumni').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('button[type="submit"]');
            btn.textContent = 'Menyimpan...';
            btn.disabled = true;
            
            const data = {
                kode_responden_asli: document.getElementById('kode_responden_asli').value,
                tahun_lulus: document.getElementById('tahun_lulus').value,
                nama_prodi: document.getElementById('nama_prodi').value,
                jenjang: document.getElementById('jenjang').value,
                jurusan: document.getElementById('jurusan').value,
                status_kerja: document.getElementById('status_kerja').value,
                jenis_pekerjaan: document.getElementById('jenis_pekerjaan').value || "-", 
                kategori_instansi: document.getElementById('kategori_instansi').value,
                jenis_lembaga: document.getElementById('jenis_lembaga').value || "-",
                range_pendapatan: document.getElementById('range_pendapatan').value,
                lama_tunggu_bulan: document.getElementById('lama_tunggu_bulan').value,
                nama_kota: document.getElementById('nama_kota').value
            };
            
            try {
                const response = await fetch('/data_warehouse/backend/alumni.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                const alertEl = document.getElementById('form-alert');
                alertEl.style.display = 'block';
                
                if (result.status === 'success') {
                    alertEl.className = 'alert alert-success';
                    alertEl.textContent = result.message;
                    this.reset();
                } else {
                    alertEl.className = 'alert alert-error';
                    alertEl.textContent = result.message;
                }
            } catch (err) {
                console.error(err);
                const alertEl = document.getElementById('form-alert');
                alertEl.style.display = 'block';
                alertEl.className = 'alert alert-error';
                alertEl.textContent = 'Gagal terhubung ke server.';
            } finally {
                btn.textContent = 'Simpan Data Alumni';
                btn.disabled = false;
                
                // Hide alert after 5s
                setTimeout(() => {
                    document.getElementById('form-alert').style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
