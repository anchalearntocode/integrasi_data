<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lihat seluruh data alumni tracer study serapan kerja">
    <title>DataAlumni — Data Keseluruhan</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="dashboard.html" class="sidebar-logo">DataAlumni</a>

            <span class="nav-section-label">Menu</span>

            <a href="dashboard.html" class="nav-link" id="nav-dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9"></rect>
                    <rect x="14" y="3" width="7" height="5"></rect>
                    <rect x="14" y="12" width="7" height="9"></rect>
                    <rect x="3" y="16" width="7" height="5"></rect>
                </svg>
                Dashboard
            </a>
            <a href="data.html" class="nav-link active" id="nav-data">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                Data Alumni
            </a>
            <a href="input.html" class="nav-link" id="nav-input">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Input Data
            </a>

            <a href="#" class="nav-link nav-logout" id="nav-logout" onclick="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Keluar
            </a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Data Seluruh Alumni</h1>
                <p class="page-subtitle">Lihat dan saring semua data lulusan</p>
            </div>

            <!-- Filters -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label class="form-label" for="filter-prodi">Filter Program Studi</label>
                    <select id="filter-prodi" class="form-control">
                        <option value="all">Semua Program Studi</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="form-label" for="filter-status">Filter Status Pekerjaan</label>
                    <select id="filter-status" class="form-control">
                        <option value="all">Semua Status Pekerjaan</option>
                    </select>
                </div>
            </div>

            <!-- Table -->
            <div class="card glass">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Kode</th>
                                <th>Prodi</th>
                                <th>Tahun</th>
                                <th>Status Kerja</th>
                                <th>Instansi</th>
                                <th>Pendapatan</th>
                                <th>Tunggu</th>
                            </tr>
                        </thead>
                        <tbody id="full-alumni-table-body">
                            <tr>
                                <td colspan="7" style="padding: 40px; text-align: center; color: var(--text-tertiary);">
                                    Memuat data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=5"></script>
    <script>
        checkAuth();
        if (typeof loadFullAlumniData === 'function') {
            loadFullAlumniData();
        }
    </script>
</body>

</html>
