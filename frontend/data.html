<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Alumni — DataAlumni</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #080d17;
        --surface: rgba(13, 21, 38, 0.8);
        --border: rgba(99, 179, 237, 0.12);
        --border-2: rgba(99, 179, 237, 0.22);
        --cyan: #38bdf8;
        --cyan-dim: #7dd3fc;
        --blue: #3b82f6;
        --text: #e2eaf6;
        --text-2: #94a9c4;
        --text-3: #5b7294;
        --green: #34d399;
        --red: #f87171;
        --amber: #fbbf24;
        --sidebar-w: 256px;
        --r-xl: 22px;
        --r-md: 12px;
        --r-lg: 16px;
        --shadow: 0 24px 60px rgba(2, 8, 20, 0.5);
        --font-body: "Plus Jakarta Sans", sans-serif;
        --font-display: "Syne", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 70% 50% at 20% -10%,
            rgba(56, 189, 248, 0.08),
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 110%,
            rgba(59, 130, 246, 0.07),
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .layout-wrapper {
        display: flex;
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      .sidebar {
        width: var(--sidebar-w);
        background: rgba(8, 13, 23, 0.96);
        border-right: 1px solid var(--border);
        backdrop-filter: blur(24px);
        display: flex;
        flex-direction: column;
        padding: 28px 16px 24px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .sidebar-logo {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--cyan);
        padding: 0 10px 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }

      .sidebar-logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--cyan), var(--blue));
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .sidebar-section-label {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--text-3);
        padding: 10px 12px 6px;
        text-transform: uppercase;
      }

      .nav-link {
        text-decoration: none;
        color: var(--text-2);
        padding: 11px 12px;
        border-radius: var(--r-md);
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 0.88rem;
        transition: 0.22s ease;
      }

      .nav-icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.04);
      }

      .nav-link:hover,
      .nav-link.active {
        color: var(--cyan-dim);
        background: rgba(56, 189, 248, 0.1);
      }

      .nav-link.nav-logout {
        margin-top: auto;
        color: #fda4af;
      }

      .main-content {
        flex: 1;
        padding: 36px 40px;
        min-width: 0;
      }

      .page-header {
        margin-bottom: 28px;
      }

      .page-title {
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 2.5vw, 2.2rem);
        font-weight: 800;
      }

      .page-subtitle {
        color: var(--text-2);
        font-size: 0.9rem;
        margin-top: 6px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-xl);
        backdrop-filter: blur(18px);
      }

      .card-pad {
        padding: 24px 26px;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .card-title {
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--cyan-dim);
      }

      .filter-bar {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
        padding: 20px 24px;
        align-items: flex-end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .form-label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-3);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .form-control {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        background: rgba(8, 13, 23, 0.8);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.88rem;
        outline: none;
      }

      select.form-control option {
        background: #0d1526;
        color: var(--text);
      }

      .table-wrapper {
        width: 100%;
        overflow-x: auto;
        border-radius: 14px;
      }

      table {
        width: 100%;
        min-width: 1180px;
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 0.84rem;
      }

      thead th {
        padding: 14px 18px;
        color: var(--text-3);
        text-align: left;
        font-size: 0.71rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 800;
        border-bottom: 1px solid var(--border);
        background: rgba(8, 13, 23, 0.54);
        white-space: nowrap;
      }

      tbody td {
        padding: 15px 18px;
        border-bottom: 1px solid rgba(99, 179, 237, 0.07);
        color: var(--text-2);
        vertical-align: middle;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      tbody tr {
        transition: 0.15s ease;
      }

      tbody tr:hover {
        background: rgba(56, 189, 248, 0.05);
      }

      th.col-id,
      td.col-id {
        width: 76px;
      }

      th.col-kode,
      td.col-kode {
        width: 120px;
      }

      th.col-prodi,
      td.col-prodi {
        width: 88px;
      }

      th.col-tahun,
      td.col-tahun {
        width: 94px;
      }

      th.col-status,
      td.col-status {
        width: 170px;
      }

      th.col-instansi,
      td.col-instansi {
        width: 250px;
      }

      th.col-pendapatan,
      td.col-pendapatan {
        width: 210px;
      }

      th.col-tunggu,
      td.col-tunggu {
        width: 90px;
      }

      code {
        color: var(--cyan-dim);
        font-size: 0.78rem;
      }

      .empty-row {
        text-align: center;
        color: var(--text-3);
        padding: 32px !important;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 11px;
        border-radius: 99px;
        font-size: 0.72rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .badge-green {
        background: rgba(52, 211, 153, 0.1);
        border: 1px solid rgba(52, 211, 153, 0.22);
        color: var(--green);
      }

      .badge-amber {
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.22);
        color: var(--amber);
      }

      .badge-blue {
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.22);
        color: #93c5fd;
      }

      .badge-red {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.22);
        color: var(--red);
      }

      .income-text {
        color: var(--green);
        font-weight: 700;
      }

      .waiting-text {
        color: var(--amber);
        font-weight: 700;
      }

      .row-count {
        font-size: 0.8rem;
        color: var(--text-3);
        text-align: right;
      }

      .row-count span {
        color: var(--cyan-dim);
        font-weight: 800;
      }

      #pagination-wrapper {
        margin-top: 22px;
      }

      .pagination-btn {
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 23, 0.7);
        color: var(--text-2);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.82rem;
        font-weight: 700;
        transition: 0.2s ease;
      }

      .pagination-btn:hover:not(:disabled) {
        color: var(--cyan-dim);
        border-color: var(--cyan);
        background: rgba(56, 189, 248, 0.08);
      }

      .pagination-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        background: rgba(8, 13, 23, 0.96);
        border: 1px solid var(--border-2);
        color: var(--cyan-dim);
        padding: 13px 18px;
        border-radius: var(--r-lg);
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(14px);
        pointer-events: none;
        transition: 0.28s ease;
        z-index: 9999;
        font-size: 0.88rem;
        font-weight: 600;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 980px) {
        .layout-wrapper {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          height: auto;
          position: relative;
          flex-direction: row;
          flex-wrap: wrap;
          padding: 16px;
        }

        .sidebar-logo {
          border-bottom: none;
          padding-bottom: 0;
          margin-bottom: 0;
        }

        .sidebar-section-label {
          display: none;
        }

        .nav-link.nav-logout {
          margin-top: 0;
        }

        .main-content {
          padding: 24px 20px;
        }
      }

      @media (max-width: 640px) {
        .filter-bar {
          flex-direction: column;
        }

        .main-content {
          padding: 18px 14px;
        }

        .card-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .row-count {
          text-align: left;
        }
      }
    </style>
  </head>

  <body>
    <div class="layout-wrapper">
      <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="sidebar-logo-icon">◈</div>
          Data Alumni
        </a>

        <div class="sidebar-section-label">Navigasi</div>

        <a href="dashboard.html" class="nav-link">
          <div class="nav-icon">📊</div>
          Dashboard
        </a>

        <a href="data.html" class="nav-link active">
          <div class="nav-icon">🗄️</div>
          Data Alumni
        </a>

        <a href="input.html" class="nav-link">
          <div class="nav-icon">✏️</div>
          Edit Data
        </a>

        <a href="#" class="nav-link nav-logout" onclick="logout()">
          <div class="nav-icon">🚪</div>
          Logout
        </a>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1 class="page-title">Data Seluruh Alumni</h1>
          <p class="page-subtitle">
            Saring dan pantau data lulusan berdasarkan prodi serta status kerja.
          </p>
        </div>

        <section class="card filter-bar">
          <div class="filter-group">
            <label for="filter-prodi" class="form-label">Program Studi</label>
            <select id="filter-prodi" class="form-control">
              <option value="all">Semua Program Studi</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filter-status" class="form-label">
              Status Pekerjaan
            </label>
            <select id="filter-status" class="form-control">
              <option value="all">Semua Status Pekerjaan</option>
            </select>
          </div>
        </section>

        <section class="card card-pad">
          <div class="card-header">
            <h3 class="card-title">🗄️ Tabel Data Alumni</h3>
            <div id="row-count-display" class="row-count">Menunggu data...</div>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th class="col-id">ID</th>
                  <th class="col-kode">Kode</th>
                  <th class="col-prodi">Prodi</th>
                  <th class="col-tahun">Tahun</th>
                  <th class="col-status">Status Kerja</th>
                  <th class="col-instansi">Instansi / Perusahaan</th>
                  <th class="col-pendapatan">Pendapatan</th>
                  <th class="col-tunggu">Tunggu</th>
                </tr>
              </thead>

              <tbody id="full-alumni-table-body">
                <tr>
                  <td colspan="8" class="empty-row">Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="pagination-wrapper"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/app.js?v=901"></script>
    <script>
      checkAuth();
    </script>
  </body>
</html>
