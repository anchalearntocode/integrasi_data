<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Data - Data Keseluruhan</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .filter-bar {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        border: 1px solid var(--border-color);
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="layout-wrapper">
      <!-- Sidebar -->
      <div class="sidebar glass">
        <a href="dashboard.html" class="sidebar-logo">DataAlumni</a>

        <a href="dashboard.html" class="nav-link"> Dashboard </a>

        <a href="data.html" class="nav-link active"> Data Alumni </a>

        <a href="input.html" class="nav-link"> Input Data </a>

        <a href="#" class="nav-link nav-logout" onclick="logout()"> Logout </a>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="page-header">
          <h1 class="page-title">Data Seluruh Alumni</h1>
          <p class="page-subtitle">Lihat dan saring semua data lulusan</p>
        </div>

        <!-- Filters -->
        <div class="filter-bar glass">
          <div class="filter-group">
            <label class="form-label">Filter Program Studi</label>
            <select id="filter-prodi" class="form-control">
              <option value="all">Semua Program Studi</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="form-label">Filter Status Pekerjaan</label>
            <select id="filter-status" class="form-control">
              <option value="all">Semua Status Pekerjaan</option>
            </select>
          </div>
        </div>

        <!-- Table -->
        <div class="card glass">
          <div style="overflow-x: auto">
            <table
              style="width: 100%; border-collapse: collapse; font-size: 14px"
            >
              <thead>
                <tr
                  style="
                    border-bottom: 1px solid var(--border-color);
                    text-align: left;
                  "
                >
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Kode
                  </th>
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Prodi
                  </th>
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Tahun
                  </th>
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Status Kerja
                  </th>
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Instansi/Perusahaan
                  </th>
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Pendapatan
                  </th>
                  <th
                    style="
                      padding: 12px;
                      color: var(--text-secondary);
                      font-weight: 500;
                    "
                  >
                    Tunggu
                  </th>
                </tr>
              </thead>

              <tbody id="full-alumni-table-body">
                <tr>
                  <td
                    colspan="7"
                    style="
                      padding: 20px;
                      text-align: center;
                      color: var(--text-secondary);
                    "
                  >
                    Memuat data...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js?v=500"></script>

    <script>
      checkAuth();

      if (typeof loadFullAlumniData === "function") {
        loadFullAlumniData();
      }
    </script>
  </body>
</html>
