<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Data - Data Keseluruhan</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <div class="sidebar glass">
            <a href="dashboard.html" class="sidebar-logo">DataAlumni</a>
            <a href="dashboard.html" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Dashboard
            </a>
            <a href="data.html" class="nav-link active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                Data Alumni
            </a>
            <a href="input.html" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                Input Data
            </a>
            
            <a href="#" class="nav-link nav-logout" onclick="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Data Seluruh Alumni</h1>
                <p class="page-subtitle">Lihat dan saring semua data lulusan</p>
            </div>

            <!-- Filters -->
            <div class="filter-bar glass">
                <div class="filter-group">
                    <label class="form-label">Filter Program Studi</label>
                    <select id="filter-prodi" class="form-control">
                        <option value="all">Semua Program Studi</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="form-label">Filter Status Pekerjaan</label>
                    <select id="filter-status" class="form-control">
                        <option value="all">Semua Status Pekerjaan</option>
                    </select>
                </div>
            </div>

            <!-- Table -->
            <div class="card glass">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Kode</th>
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Prodi</th>
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Tahun</th>
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Status Kerja</th>
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Instansi/Perusahaan</th>
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Pendapatan</th>
                                <th style="padding: 12px; color: var(--text-secondary); font-weight: 500;">Tunggu</th>
                            </tr>
                        </thead>
                        <tbody id="full-alumni-table-body">
                            <tr>
                                <td colspan="7" style="padding: 20px; text-align: center; color: var(--text-secondary);">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js?v=3"></script>
    <script>
        checkAuth();
        if (typeof loadFullAlumniData === 'function') {
            loadFullAlumniData();
        }
    </script>
</body>
</html>
